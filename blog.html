    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #c84b31;
            --primary-dark: #a33d28;
            --secondary: #ffb319;
            --dark: #1a1a2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #333;
            background: #fafafa;
        }

        /* ── Nav ── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(255,255,255,0.98);
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
        }

        .nav-logo {
            font-size: 20px; font-weight: 700;
            color: var(--primary); text-decoration: none;
        }

        .nav-links {
            display: flex; gap: 20px; list-style: none; align-items: center;
        }

        .nav-links a {
            text-decoration: none; color: #555;
            font-weight: 500; font-size: 14px;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        .nav-cta {
            background: var(--primary); color: white;
            padding: 10px 20px; border-radius: 25px;
            text-decoration: none; font-weight: 600; font-size: 14px;
            transition: background 0.2s;
        }

        .nav-cta:hover { background: var(--primary-dark); }

        /* ── Blog header ── */
        .blog-header {
            background: linear-gradient(135deg, var(--dark), #2d3561);
            padding: 100px 24px 56px;
            text-align: center;
            color: white;
        }

        .blog-header h1 {
            font-size: clamp(28px, 5vw, 44px);
            font-weight: 800;
            margin-bottom: 12px;
        }

        .blog-header p {
            font-size: 17px;
            opacity: 0.8;
            max-width: 520px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* ── Post list ── */
        .post-list {
            max-width: 860px;
            margin: 0 auto;
            padding: 52px 24px 80px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .post-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
            display: grid;
            grid-template-columns: 280px 1fr;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(0,0,0,0.1);
        }

        .post-card-img {
            width: 100%; height: 100%;
            min-height: 180px;
            object-fit: cover;
            display: block;
            background: linear-gradient(135deg, #f0f0f0, #e8e8e8);
        }

        .post-card-img-placeholder {
            width: 100%; min-height: 180px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 48px;
        }

        .post-card-body {
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .post-card-date {
            font-size: 12px;
            color: #999;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .post-card h2 {
            font-size: 20px;
            font-weight: 800;
            line-height: 1.3;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .post-card p {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .post-card-read {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
        }

        /* ── Single post ── */
        .post-hero {
            position: relative;
            width: 100%;
            min-height: 380px;
            max-height: 520px;
            height: 50vh;
            overflow: hidden;
            background: linear-gradient(135deg, var(--dark), #2d3561);
            display: flex;
            align-items: flex-end;
            margin-top: 64px;
        }

        .post-hero img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .post-hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.65) 100%);
        }

        .post-hero-text {
            position: relative;
            max-width: 860px; margin: 0 auto; width: 100%;
            padding: 0 24px 40px;
        }

        .post-hero-date {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .post-hero-title {
            color: white;
            font-size: clamp(24px, 4vw, 40px);
            font-weight: 800;
            line-height: 1.2;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .post-content-wrap {
            max-width: 760px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        /* Quill content styles */
        .ql-editor {
            padding: 0;
            font-size: 17px;
            line-height: 1.8;
            color: #333;
        }

        .ql-editor h1 { font-size: 28px; font-weight: 700; margin: 32px 0 12px; color: var(--dark); }
        .ql-editor h2 { font-size: 22px; font-weight: 700; margin: 28px 0 10px; color: var(--dark); }
        .ql-editor h3 { font-size: 18px; font-weight: 700; margin: 24px 0 8px; color: var(--dark); }
        .ql-editor p  { margin-bottom: 16px; }
        .ql-editor ul, .ql-editor ol { padding-left: 24px; margin-bottom: 16px; }
        .ql-editor li { margin-bottom: 6px; }
        .ql-editor blockquote {
            border-left: 4px solid var(--primary);
            padding-left: 20px; margin: 24px 0;
            font-style: italic; color: #555;
        }
        .ql-editor strong { font-weight: 700; }
        .ql-editor em { font-style: italic; }
        .ql-editor a { color: var(--primary); }
        .ql-editor img { max-width: 100%; border-radius: 10px; margin: 16px 0; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #888;
            text-decoration: none;
            margin-bottom: 32px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--primary); }

        /* ── CTA ── */
        .cta-box {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 16px; padding: 40px 36px;
            text-align: center; color: white; margin-top: 52px;
        }

        .cta-box h2 { font-size: 22px; margin-bottom: 8px; }
        .cta-box p  { opacity: 0.9; margin-bottom: 24px; font-size: 15px; }

        .btn-cta {
            display: inline-block;
            background: var(--secondary); color: var(--dark);
            font-weight: 700; padding: 14px 36px;
            border-radius: 30px; text-decoration: none; font-size: 16px;
            transition: transform 0.2s;
        }

        .btn-cta:hover { transform: scale(1.05); }

        /* ── States ── */
        .state-box {
            text-align: center; padding: 100px 20px; color: #888;
        }
        .state-box .icon { font-size: 48px; margin-bottom: 16px; }
        .state-box h2 { color: #333; margin-bottom: 8px; }
        .state-box a { color: var(--primary); }

        /* ── Footer ── */
        footer {
            background: var(--dark);
            color: rgba(255,255,255,0.7);
            text-align: center; padding: 24px; font-size: 14px;
        }
        footer a { color: rgba(255,255,255,0.7); text-decoration: none; }

        @media (max-width: 640px) {
            .post-card { grid-template-columns: 1fr; }
            .post-card-img, .post-card-img-placeholder { min-height: 180px; max-height: 200px; }
            .nav-links { display: none; }
            .blog-header { padding-top: 88px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="pet-transport-to-spain.html" class="nav-logo">🐕 Viva Españiel</a>
        <ul class="nav-links">
            <li><a href="pet-transport-to-spain.html#about">About</a></li>
            <li><a href="pet-transport-to-spain.html#trust">Why Us</a></li>
            <li><a href="pet-transport-to-spain.html#testimonials">Testimonials</a></li>
            <li><a href="blog.html" class="active">Blog</a></li>
        </ul>
        <a href="pet-transport-to-spain.html#booking" class="nav-cta">Book Transport</a>
    </nav>

    <div id="blogHeader"></div>
    <div id="mainSlot"></div>

    <footer>© 2026 Viva Españiel · <a href="pet-transport-to-spain.html">vivaespaniel.com</a></footer>

    <script>
        const h = {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
        };

        function fmtDate(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function getParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        async function load() {
            const postSlug = getParam('post');
            const header   = document.getElementById('blogHeader');
            const main     = document.getElementById('mainSlot');

            if (postSlug) {
                await loadPost(postSlug, header, main);
            } else {
                await loadList(header, main);
            }
        }

        async function loadList(header, main) {
            document.title = 'Blog — Dog Transport Spain to UK | Viva Españiel';

            header.innerHTML = `
                <div class="blog-header">
                    <h1>Dog Transport Spain &amp; UK — Guides, Tips &amp; Advice</h1>
                    <p>Advice from Jon on travelling between Spain and the UK with your dog — paperwork, what to expect, and everything in between.</p>
                </div>`;

            try {
                const res = await fetch(
                    `${SUPABASE_URL}/rest/v1/blog_posts?published=eq.true&order=published_at.desc&select=id,title,slug,excerpt,hero_image_url,published_at`,
                    { headers: h }
                );
                const posts = res.ok ? await res.json() : [];

                if (!posts.length) {
                    main.innerHTML = `<div class="state-box"><div class="icon">✍️</div><h2>No posts yet</h2><p>Check back soon!</p></div>`;
                    return;
                }

                main.innerHTML = `<div class="post-list">${posts.map(p => {
                    const img = p.hero_image_url
                        ? `<img class="post-card-img" src="${escHtml(p.hero_image_url)}" alt="${escHtml(p.title)}" loading="lazy">`
                        : `<div class="post-card-img-placeholder">🐾</div>`;
                    return `<a href="blog.html?post=${escHtml(p.slug)}" class="post-card">
                        ${img}
                        <div class="post-card-body">
                            <div class="post-card-date">${fmtDate(p.published_at)}</div>
                            <h2>${escHtml(p.title)}</h2>
                            ${p.excerpt ? `<p>${escHtml(p.excerpt)}</p>` : ''}
                            <span class="post-card-read">Read more →</span>
                        </div>
                    </a>`;
                }).join('')}</div>`;

            } catch (e) {
                main.innerHTML = `<div class="state-box"><div class="icon">😔</div><h2>Couldn't load posts</h2><p>${escHtml(e.message)}</p></div>`;
            }
        }

        async function loadPost(slug, header, main) {
            try {
                const res = await fetch(
                    `${SUPABASE_URL}/rest/v1/blog_posts?slug=eq.${encodeURIComponent(slug)}&published=eq.true&limit=1`,
                    { headers: h }
                );
                const rows = res.ok ? await res.json() : [];
                const p = rows[0];

                if (!p) {
                    header.innerHTML = '';
                    main.innerHTML = `<div class="state-box" style="padding-top:120px;"><div class="icon">🐾</div><h2>Post not found</h2><p><a href="blog.html">← Back to blog</a></p></div>`;
                    return;
                }

                // Update meta
                document.title = (p.meta_title || p.title) + ' | Viva Españiel';
                const metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc) metaDesc.setAttribute('content', p.meta_description || p.excerpt || '');
                const canonical = document.querySelector('link[rel="canonical"]');
                if (canonical) canonical.setAttribute('href', `https://vivaespaniel.com/blog.html?post=${p.slug}`);

                // Add BlogPosting schema
                const schema = {
                    '@context': 'https://schema.org',
                    '@type': 'BlogPosting',
                    'headline': p.title,
                    'description': p.excerpt || '',
                    'datePublished': p.published_at,
                    'dateModified': p.updated_at,
                    'author': { '@type': 'Person', 'name': 'Jon Brown' },
                    'publisher': { '@type': 'Organization', 'name': 'Viva Españiel', 'url': 'https://vivaespaniel.com' },
                    'url': `https://vivaespaniel.com/blog.html?post=${p.slug}`,
                    ...(p.hero_image_url ? { 'image': p.hero_image_url } : {})
                };
                const s = document.createElement('script');
                s.type = 'application/ld+json';
                s.textContent = JSON.stringify(schema);
                document.head.appendChild(s);

                // Hero
                header.innerHTML = `
                    <div class="post-hero">
                        ${p.hero_image_url ? `<img src="${escHtml(p.hero_image_url)}" alt="${escHtml(p.title)}">` : ''}
                        <div class="post-hero-overlay"></div>
                        <div class="post-hero-text">
                            <div class="post-hero-date">${fmtDate(p.published_at)}</div>
                            <h1 class="post-hero-title">${escHtml(p.title)}</h1>
                        </div>
                    </div>`;

                // Body
                main.innerHTML = `
                    <div class="post-content-wrap">
                        <a href="blog.html" class="back-link">← Back to blog</a>
                        <div class="ql-editor">${p.body_html}</div>
                        <div class="cta-box">
                            <h2>Ready to book your dog's journey?</h2>
                            <p>Join hundreds of happy families who've trusted Viva Españiel with their dogs.</p>
                            <a href="pet-transport-to-spain.html#booking" class="btn-cta">Book Now 🐾</a>
                        </div>
                    </div>`;

            } catch (e) {
                header.innerHTML = '';
                main.innerHTML = `<div class="state-box" style="padding-top:120px;"><div class="icon">😔</div><h2>Something went wrong</h2><p>${escHtml(e.message)}</p></div>`;
            }
        }

        function escHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        load();
    </script>
</body>
