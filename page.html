    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #c84b31;
            --primary-dark: #a33d28;
            --secondary: #ffb319;
            --dark: #1a1a2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #333;
            background: #fafafa;
        }

        /* ── Nav ── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            transition: background 0.3s, box-shadow 0.3s;
        }

        nav.scrolled {
            background: rgba(255,255,255,0.98);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        .nav-logo {
            font-size: 20px; font-weight: 700;
            color: white; text-decoration: none;
            text-shadow: 0 1px 4px rgba(0,0,0,0.4);
            transition: color 0.3s, text-shadow 0.3s;
        }

        nav.scrolled .nav-logo { color: var(--primary); text-shadow: none; }

        .nav-links {
            display: flex; gap: 20px; list-style: none; align-items: center;
        }

        .nav-links a {
            text-decoration: none; color: rgba(255,255,255,0.9);
            font-weight: 500; font-size: 14px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            transition: color 0.2s;
        }

        nav.scrolled .nav-links a { color: #555; text-shadow: none; }
        .nav-links a:hover { color: var(--secondary); }
        nav.scrolled .nav-links a:hover { color: var(--primary); }

        .nav-cta {
            background: var(--primary); color: white;
            padding: 10px 20px; border-radius: 25px;
            text-decoration: none; font-weight: 600; font-size: 14px;
            transition: background 0.2s;
        }

        .nav-cta:hover { background: var(--primary-dark); }

        /* ── Hero ── */
        .hero {
            position: relative;
            width: 100%; min-height: 420px; max-height: 560px; height: 55vh;
            overflow: hidden;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex; align-items: flex-end;
        }

        .hero-img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; object-position: center;
        }

        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.6) 100%);
        }

        .hero-text {
            position: relative;
            max-width: 900px; margin: 0 auto; width: 100%;
            padding: 0 24px 40px;
        }

        .hero-title {
            color: white; font-size: clamp(28px, 5vw, 48px);
            font-weight: 700; line-height: 1.15;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* ── Content ── */
        .content-wrap {
            max-width: 860px;
            margin: 0 auto;
            padding: 52px 24px 80px;
        }

        /* Quill content styles */
        .ql-editor {
            padding: 0;
            font-size: 17px;
            line-height: 1.8;
            color: #333;
        }

        .ql-editor h1 { font-size: 28px; font-weight: 700; margin: 32px 0 12px; color: var(--dark); }
        .ql-editor h2 { font-size: 22px; font-weight: 700; margin: 28px 0 10px; color: var(--dark); }
        .ql-editor h3 { font-size: 18px; font-weight: 700; margin: 24px 0 8px; color: var(--dark); }
        .ql-editor p  { margin-bottom: 16px; }
        .ql-editor ul, .ql-editor ol { padding-left: 24px; margin-bottom: 16px; }
        .ql-editor li { margin-bottom: 6px; }
        .ql-editor blockquote {
            border-left: 4px solid var(--primary);
            padding-left: 20px; margin: 24px 0;
            font-style: italic; color: #555;
        }
        .ql-editor strong { font-weight: 700; }
        .ql-editor em { font-style: italic; }
        .ql-editor a { color: var(--primary); }
        .ql-editor img { max-width: 100%; border-radius: 10px; margin: 16px 0; }

        /* ── Video ── */
        .video-wrap {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 16px;
            overflow: hidden;
            margin-top: 40px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }

        .video-wrap iframe {
            width: 100%; height: 100%;
            border: none; display: block;
        }

        /* ── CTA ── */
        .cta-box {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 16px; padding: 40px 36px;
            text-align: center; color: white; margin-top: 52px;
        }

        .cta-box h2 { font-size: 22px; margin-bottom: 8px; }
        .cta-box p  { opacity: 0.9; margin-bottom: 24px; }

        .btn-cta {
            display: inline-block;
            background: var(--secondary); color: var(--dark);
            font-weight: 700; padding: 14px 36px;
            border-radius: 30px; text-decoration: none; font-size: 16px;
            transition: transform 0.2s;
        }

        .btn-cta:hover { transform: scale(1.05); }

        /* ── States ── */
        .state-box {
            text-align: center; padding: 160px 20px; color: #888;
        }

        .state-box .icon { font-size: 48px; margin-bottom: 16px; }
        .state-box h2 { color: #333; margin-bottom: 8px; }
        .state-box a { color: var(--primary); }

        /* ── Footer ── */
        footer {
            background: var(--dark);
            color: rgba(255,255,255,0.7);
            text-align: center; padding: 24px; font-size: 14px;
        }

        footer a { color: rgba(255,255,255,0.7); text-decoration: none; }

        .nav-whatsapp {
            display: none; align-items: center; gap: 6px;
            background: #25d366; color: white; padding: 8px 14px;
            border-radius: 25px; text-decoration: none; font-weight: 600; font-size: 13px;
        }
        .nav-whatsapp:hover { background: #1ebe5d; }
        .nav-whatsapp svg { flex-shrink: 0; }

        @media (max-width: 600px) {
            .hero { height: 45vh; }
            .hero-title { font-size: 26px; }
            .nav-links { display: none; }
        }
    </style>

<body>

            WhatsApp

    <div id="heroSlot"></div>

    <div id="mainSlot">
        <div class="state-box">
            <div class="icon">🐾</div>
            <p>Loading…</p>
        </div>
    </div>

    <footer>© 2026 Viva Españiel • <a href="pet-transport-to-spain.html">vivaespaniel.com</a></footer>

    <script>
        window.addEventListener('scroll', () => {
            document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50);
        });

        function getParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        function getYouTubeId(url) {
            if (!url) return null;
            const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?\s]+)/);
            return m ? m[1] : null;
        }

        async function load() {
            const slug = getParam('slug');
            const heroSlot = document.getElementById('heroSlot');
            const mainSlot = document.getElementById('mainSlot');

            if (!slug) {
                document.getElementById('nav').classList.add('scrolled');
                heroSlot.innerHTML = '';
                mainSlot.innerHTML = `<div class="state-box"><div class="icon">🤔</div><h2>Page not found</h2><p><a href="pet-transport-to-spain.html">← Back home</a></p></div>`;
                return;
            }

            try {
                const h = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY };

                // Load page + nav pages in parallel
                const [pageRes, pagesRes] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/pages?slug=eq.${encodeURIComponent(slug)}&limit=1`, { headers: h }),
                    fetch(`${SUPABASE_URL}/rest/v1/pages?status=eq.live&order=sort_order&select=slug,nav_label`, { headers: h }),
                ]);

                const pages    = pagesRes.ok ? await pagesRes.json() : [];
                const pageRows = pageRes.ok  ? await pageRes.json()  : [];
                const p        = pageRows[0];

                // Inject custom page links into nav
                if (pages.length) {
                    const navLinks = document.getElementById('navLinks');
                    pages.forEach(pg => {
                        const li = document.createElement('li');
                        li.innerHTML = `<a href="page.html?slug=${pg.slug}">${pg.nav_label || pg.slug}</a>`;
                        navLinks.appendChild(li);
                    });
                }

                if (!p) {
                    document.getElementById('nav').classList.add('scrolled');
                    heroSlot.innerHTML = '';
                    mainSlot.innerHTML = `<div class="state-box"><div class="icon">🐕</div><h2>Page not found</h2><p><a href="pet-transport-to-spain.html">← Back home</a></p></div>`;
                    return;
                }

                // Update meta
                document.title = p.meta_title || `${p.title} — Viva Españiel`;
                const metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc && p.meta_description) metaDesc.setAttribute('content', p.meta_description);
                const canonical = document.querySelector('link[rel="canonical"]');
                if (canonical) canonical.setAttribute('href', `https://vivaespaniel.com/page.html?slug=${p.slug}`);

                // Hero
                const hasHero = p.hero_image_url && p.hero_image_url.trim() !== '';
                heroSlot.innerHTML = `
                    <div class="hero">
                        ${hasHero ? `<img src="${p.hero_image_url}" alt="${p.title}" class="hero-img">` : ''}
                        <div class="hero-overlay"></div>
                        <div class="hero-text">
                            <h1 class="hero-title">${p.title}</h1>
                        </div>
                    </div>`;

                // Body + video
                const ytId = getYouTubeId(p.video_url);
                const videoHtml = ytId ? `
                    <div class="video-wrap">
                        <iframe src="https://www.youtube.com/embed/${ytId}?rel=0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            allowfullscreen loading="lazy"></iframe>
                    </div>` : '';

                mainSlot.innerHTML = `
                    <div class="content-wrap">
                        <div class="ql-editor">${p.body_html}</div>
                        ${videoHtml}
                        <div class="cta-box">
                            <h2>Ready to book your dog's journey?</h2>
                            <p>Join hundreds of happy families who've trusted Viva Españiel.</p>
                            <a href="pet-transport-to-spain.html#booking" class="btn-cta">Book Now 🐾</a>
                        </div>
                    </div>`;

            } catch (e) {
                document.getElementById('nav').classList.add('scrolled');
                heroSlot.innerHTML = '';
                mainSlot.innerHTML = `<div class="state-box"><div class="icon">😔</div><h2>Something went wrong</h2><p>${e.message}</p></div>`;
            }
        }

        async function initNav() {
            const h = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY };
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/settings?key=in.(whatsapp_number,whatsapp_enabled)&select=key,value`, { headers: h });
                if (!res.ok) return;
                const settings = await res.json();
                const waNumber  = settings.find(r => r.key === 'whatsapp_number')?.value  || '';
                const waEnabled = settings.find(r => r.key === 'whatsapp_enabled')?.value === 'true';
                if (waEnabled && waNumber) {
                    const el = document.getElementById('navWhatsapp');
                    el.href = `https://wa.me/${waNumber.replace(/\D/g, '')}`;
                    el.style.display = 'flex';
                }
            } catch (e) {}
        }

        initNav();
        load();
    </script>
